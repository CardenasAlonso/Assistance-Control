<div class="page-container">
  <div class="page-header">
    <div>
      <h1>Mi Asistencia</h1>
      <p>{{ userName }} · Abril 2025</p>
    </div>
  </div>

  <div class="grid-4">
    <div class="stat-card">
      <div class="stat-icon" style="background:#E8F5EE"><lucide-icon [img]="CheckIcon"
          style="color:#1B6E3C"></lucide-icon></div>
      <div class="stat-body">
        <div class="stat-value">{{present}}</div>
        <div class="stat-label">Días Presente</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon" style="background:#FAF0F1"><lucide-icon [img]="XIcon" style="color:#8B1A2B"></lucide-icon>
      </div>
      <div class="stat-body">
        <div class="stat-value">{{absent}}</div>
        <div class="stat-label">Ausencias</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon" style="background:#FEF7E6"><lucide-icon [img]="ClockIcon"
          style="color:#92700C"></lucide-icon></div>
      <div class="stat-body">
        <div class="stat-value">{{late}}</div>
        <div class="stat-label">Tardanzas</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon" style="background:#EEF1F8"><lucide-icon [img]="CalIcon"
          style="color:#1A2E5B"></lucide-icon></div>
      <div class="stat-body">
        <div class="stat-value">{{pct}}%</div>
        <div class="stat-label">% Asistencia</div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title"><lucide-icon [img]="CalIcon" style="color:var(--navy)"></lucide-icon>Registro Mensual</div>
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>Fecha</th>
            <th>Día</th>
            <th>Hora Ingreso</th>
            <th>Estado</th>
          </tr>
        </thead>
        <tbody>
          @for (r of records(); track r.date) {
          <tr>
            <td><strong>{{ r.date | date:'d/MM' }}</strong></td>
            <td class="text-muted">{{ r.day }}</td>
            <td>{{ r.time }}</td>
            <td><span class="badge" [class]="statusClass(r.status)">{{ statusLabel(r.status) }}</span></td>
          </tr>
          }
        </tbody>
      </table>
    </div>
  </div>
</div>
